port: 4222
http_port: 8222

operator: "eyJ0eXAiOiJKV1QiLCJhbGciOiJlZDI1NTE5LW5rZXkifQ..t2ScBVyM0h3wvk0-BOHfp8Zm1XDcj7vOCh32Re50h8Yz6WBXZHk3BhMkMxXtj50M0Dx5ihYFY8GXY_W3-tZiAA"

# CACHE resolver: reads account JWTs from disk, no push/JetStream required
resolver {
  type: CACHE
  dir: "/etc/nats/jwt-accounts"
  ttl: "1h"
}

system_account: "AD7NPBJXTPBI3GUEMIWSMH67YNLKKMT4B7KP5RWYGFEUEY5BM6RC4JME"

tls {
  cert_file: "/etc/nats/certs/server.crt"
  key_file:  "/etc/nats/certs/server.key"
  ca_file:   "/etc/nats/certs/ca.crt"
  verify: false
  timeout: 5
}

max_payload: 1MB
max_connections: 1000
ping_interval: "30s"
ping_max: 3

debug: false
trace: false
